{% extends 'shared/base.html' %}
{% block content %}
<h1>리포트 페이지 생성</h1>
<div class="card">
<form method="post" action="/admin/pages/create">
  <select name="category_id">{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select>
  <input name="title" placeholder="페이지 제목">
  <input name="slug" placeholder="slug (비우면 자동 추천)">
  <textarea name="description" rows="3" placeholder="설명"></textarea>
  <label>템플릿 선택</label>
  <select name="template_key">
    <option value="">빈 페이지</option>
    {% for t in templates %}<option value="{{ t.template_key }}">{{ t.template_key }} - {{ t.title }}</option>{% endfor %}
  </select>
  <input name="sort_order" type="number" value="0">
  <label><input type="checkbox" name="schedule_enabled" value="true">페이지 스케줄 사용</label>
  <input name="schedule_cron" value="0 7 * * *">
  <label><input type="checkbox" name="is_active" value="true" checked>활성</label>
  <button type="submit">생성</button>
</form>
</div>
{% endblock %}
