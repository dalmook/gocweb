{% extends 'shared/base.html' %}
{% block content %}
<h1>리포트 페이지 관리</h1>
<div class="card">
<form method="post" action="/admin/pages/create">
  <select name="category_id">{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select>
  <input name="title" placeholder="제목" required>
  <input name="slug" placeholder="slug" required>
  <input name="description" placeholder="설명">
  <input name="sort_order" type="number" value="0">
  <label><input type="checkbox" name="is_active" value="true" checked>활성</label>
  <button type="submit">생성</button>
</form>
</div>
{% for p in pages %}
<div class="card">
  <form method="post" action="/admin/pages/{{ p.id }}/update">
    <select name="category_id">{% for c in categories %}<option value="{{ c.id }}" {% if c.id==p.category_id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select>
    <input name="title" value="{{ p.title }}">
    <input name="slug" value="{{ p.slug }}">
    <input name="description" value="{{ p.description }}">
    <input name="sort_order" type="number" value="{{ p.sort_order }}">
    <label><input type="checkbox" name="is_active" value="true" {% if p.is_active %}checked{% endif %}>활성</label>
    <p>블록 수: {{ block_counts.get(p.id, 0) }}</p>
    <button type="submit">저장</button>
  </form>
  <a class="btn btn-secondary" href="/admin/pages/{{ p.id }}">상세 보기</a>
  <form method="post" action="/admin/pages/{{ p.id }}/delete"><button class="btn-danger" type="submit">삭제</button></form>
</div>
{% endfor %}
{% endblock %}
