{% extends 'base.html' %}
{% block content %}
<h1>페이지: {{ page.title }}</h1>
<div class="card">
<form method="post" action="/pages/{{ page.id }}/update">
  <select name="category_id">
    {% for c in categories %}
    <option value="{{ c.id }}" {% if c.id == page.category_id %}selected{% endif %}>{{ c.name }}</option>
    {% endfor %}
  </select>
  <input name="title" value="{{ page.title }}" required>
  <input name="slug" value="{{ page.slug }}" required>
  <input name="description" value="{{ page.description }}">
  <input name="sort_order" type="number" value="{{ page.sort_order }}">
  <label><input type="checkbox" name="is_active" value="true" {% if page.is_active %}checked{% endif %}>활성</label>
  <button type="submit">페이지 저장</button>
</form>
<form method="post" action="/pages/{{ page.id }}/run"><button type="submit">페이지 전체 실행</button></form>
<a class="btn" href="/pages/{{ page.id }}/result">페이지 결과 보기</a>
</div>

<div class="card">
<h3>블록 생성</h3>
<form method="post" action="/blocks/create">
  <input type="hidden" name="page_id" value="{{ page.id }}">
  <input name="title" placeholder="블록명" required>
  <select name="block_type">
    <option value="markdown">markdown</option>
    <option value="python">python</option>
    <option value="sql">sql</option>
  </select>
  <textarea name="source_code_text" rows="8" placeholder="코드/설명"></textarea>
  <textarea name="config_json" rows="4">{}</textarea>
  <label><input type="checkbox" name="schedule_enabled" value="true">스케줄 사용</label>
  <input name="schedule_cron" value="0 7 * * *">
  <input name="sort_order" type="number" value="0">
  <label><input type="checkbox" name="is_active" value="true" checked>활성</label>
  <button type="submit">블록 저장</button>
</form>
</div>

{% for b in blocks %}
<div class="card">
  <h3>{{ b.title }} ({{ b.block_type }})</h3>
  {% set latest = latest_map.get(b.id) %}
  {% if latest %}
    <p>최근 상태: <span class="badge {{ latest.status }}">{{ latest.status }}</span> / {{ latest.summary }}</p>
  {% endif %}
  <form method="post" action="/blocks/{{ b.id }}/update">
    <input name="title" value="{{ b.title }}" required>
    <select name="block_type">
      <option value="markdown" {% if b.block_type=='markdown' %}selected{% endif %}>markdown</option>
      <option value="python" {% if b.block_type=='python' %}selected{% endif %}>python</option>
      <option value="sql" {% if b.block_type=='sql' %}selected{% endif %}>sql</option>
    </select>
    <textarea name="source_code_text" rows="10">{{ b.source_code_text }}</textarea>
    <textarea name="config_json" rows="5">{{ b.config_json }}</textarea>
    <label><input type="checkbox" name="schedule_enabled" value="true" {% if b.schedule_enabled %}checked{% endif %}>스케줄 사용</label>
    <input name="schedule_cron" value="{{ b.schedule_cron or '0 7 * * *' }}">
    <input name="sort_order" type="number" value="{{ b.sort_order }}">
    <label><input type="checkbox" name="is_active" value="true" {% if b.is_active %}checked{% endif %}>활성</label>
    <button type="submit">수정</button>
  </form>
  <form method="post" action="/blocks/{{ b.id }}/run"><button type="submit">수동 실행</button></form>
  <form method="post" action="/blocks/{{ b.id }}/delete" onsubmit="return confirm('삭제할까요?')"><button type="submit">삭제</button></form>
</div>
{% endfor %}
{% endblock %}
