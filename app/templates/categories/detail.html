{% extends 'base.html' %}
{% block content %}
<h1>카테고리: {{ category.name }}</h1>
<div class="card">
<form method="post" action="/categories/{{ category.id }}/update">
  <input name="name" value="{{ category.name }}" required>
  <input name="slug" value="{{ category.slug }}" required>
  <input name="sort_order" type="number" value="{{ category.sort_order }}">
  <label><input type="checkbox" name="is_active" value="true" {% if category.is_active %}checked{% endif %}>활성</label>
  <button type="submit">수정 저장</button>
</form>
<form method="post" action="/categories/{{ category.id }}/delete" onsubmit="return confirm('삭제할까요?')">
  <button type="submit">삭제</button>
</form>
</div>

<div class="card">
<h3>페이지 생성</h3>
<form method="post" action="/pages/create">
  <input type="hidden" name="category_id" value="{{ category.id }}">
  <input name="title" placeholder="제목" required>
  <input name="slug" placeholder="slug" required>
  <input name="description" placeholder="설명">
  <input name="sort_order" type="number" value="0">
  <label><input type="checkbox" name="is_active" value="true" checked>활성</label>
  <button type="submit">생성</button>
</form>
</div>

<div class="card">
  <h3>페이지 목록</h3>
  <ul>
  {% for p in pages %}
    <li><a href="/pages/{{ p.id }}">{{ p.title }}</a></li>
  {% else %}
    <li>페이지 없음</li>
  {% endfor %}
  </ul>
</div>
{% endblock %}
