<div class="attachments">
  <h5>첨부파일</h5>
  {% if attachments %}
  <ul class="attachment-list">
    {% for a in attachments %}
      <li>
        <span>{{ a.file_name }}</span>
        <span class="muted">({{ a.file_size }} bytes)</span>
        <a class="btn btn-sm" href="/attachments/{{ a.id }}/download">다운로드</a>
      </li>
    {% endfor %}
  </ul>
  {% else %}
    <p class="muted">첨부파일 없음</p>
  {% endif %}
</div>
